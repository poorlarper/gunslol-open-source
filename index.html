<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fed | profile</title>
    <style>
        /* CSS - The Black Aesthetic */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
        }

        /* Video Background with heavy dark filter */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.2) grayscale(1); /* Makes any video look dark/black */
        }

        /* Overlay / Click to Enter */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 1.2s ease;
        }

        #overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        /* Profile Card - Pure Black Glass */
        #card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            transform: scale(0.8);
            opacity: 0;
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #card.show {
            transform: scale(1);
            opacity: 1;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
            filter: grayscale(1);
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #fff;
            /* White Pulse Glow */
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 5px #fff, 0 0 10px rgba(255,255,255,0.2); }
            to { text-shadow: 0 0 15px #fff, 0 0 25px rgba(255,255,255,0.4); }
        }

        .bio {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .links a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
            background: rgba(255,255,255,0.02);
        }

        .links a:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }

        /* Minimal music indicator */
        .status {
            margin-top: 40px;
            font-size: 10px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="enterSite()">
        <p style="letter-spacing: 3px; font-size: 12px; color: #444;">[ CLICK ]</p>
    </div>

    <video id="bg-video" loop playsinline>
        <source src="assets/background.mp4" type="video/mp4">
    </video>

    <div id="card">
        <img src="assets/profile.gif" class="profile-pic" alt="pfp">
        <h1>fed</h1>
        <p class="bio">nothing stays white forever.</p>
        
        <div class="links">
            <a href="https://www.roblox.com/users/7343082133/profile" target="_blank">roblox</a>
        </div>

        <div class="status">
            <p>playing: assets/music.mp3</p>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="assets/music.mp3" type="audio/mp3">
    </audio>

    <script>
        function enterSite() {
            document.getElementById('overlay').classList.add('fade-out');
            document.getElementById('card').classList.add('show');
            
            const video = document.getElementById('bg-video');
            const music = document.getElementById('bg-music');

            video.play();
            music.volume = 0.2; 
            music.play();
        }
    </script>

</body>
</html>
