<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Using a high-quality fog/mountain background */
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)), 
                        url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 2.5s ease;
        }

        /* Frosted Glass Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            width: 400px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Profile Section */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .pfp {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
        }

        .info h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .info p {
            margin: 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Grid for widgets (like the screenshot) */
        .widget-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .widget {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .widget:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .widget img {
            width: 35px;
            height: 35px;
            border-radius: 8px;
        }

        .widget-text b { font-size: 13px; display: block; }
        .widget-text span { font-size: 10px; color: rgba(255, 255, 255, 0.5); }

        /* Music Player Bar (Bottom Widget) */
        .music-player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }

        .play-btn {
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-card">
            <div class="profile-header">
                <img src="https://i.pinimg.com/736x/5c/ce/94/5cce949ac2c8d1e4472ae82ed12d4a8a.jpg" class="pfp">
                <div class="info">
                    <h1>fed</h1>
                    <p>joined over 1 year ago</p>
                </div>
            </div>

            <div style="margin-top: 20px;" class="widget-grid">
                <a href="https://www.roblox.com/users/7343082133/profile" target="_blank" class="widget">
                    <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-7343082133-Png/150/150/AvatarHeadshot/WebP/noFilter" alt="rbx">
                    <div class="widget-text">
                        <b>fed</b>
                        <span>View Profile</span>
                    </div>
                </a>

                <div class="widget">
                    <div style="width: 35px; height: 35px; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center;">👤</div>
                    <div class="widget-text">
                        <b>Status</b>
                        <span>Offline</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card" style="padding: 15px 25px;">
            <div class="music-player">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="font-size: 20px;">🎵</span>
                    <div>
                        <b style="display: block; font-size: 13px;">Let Go</b>
                        <span style="color: rgba(255,255,255,0.5); font-size: 10px;">0:00 / 4:08</span>
                    </div>
                </div>
                <div class="play-btn">Ⅱ</div>
            </div>
        </div>
    </div>

</body>
</html>
